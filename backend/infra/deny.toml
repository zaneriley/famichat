[advisories]
version = 2
ignore = [
  { id = "RUSTSEC-2024-0384", reason = "transitive via openmls/fluvio-wasm-timer; no safe upgrade is available yet" },
]
yanked = "deny"

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []

[licenses]
version = 2
confidence-threshold = 0.80
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
]

[licenses.private]
ignore = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
