[advisories]
version = 2
ignore = []
yanked = "deny"

[bans]
multiple-versions = "allow"
wildcards = "allow"
highlight = "all"
# Ban a known fixture dependency so the tooling test can prove cargo-deny failures.
deny = [{ name = "base64" }]

[licenses]
version = 2
allow = ["MIT", "Apache-2.0"]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
