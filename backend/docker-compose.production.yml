# Production Docker Compose for Famichat.
#
# Prerequisites:
#   1. cp .env.production.example .env.production
#   2. chmod 0600 .env.production
#   3. Fill in all required values in .env.production
#
# Launch (from the backend/ directory):
#   docker compose --env-file .env.production -f docker-compose.production.yml up -d
#
# Backup:
#   docker compose exec postgres pg_dump -U $POSTGRES_USER $POSTGRES_DB > backup.sql
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MIX_ENV: prod
        NODE_ENV: production
    env_file:
      - .env.production
    ports:
      - "${DOCKER_WEB_PORT_FORWARD:-127.0.0.1:8001}:${PORT:-8001}"
    # Healthcheck port is hardcoded to 8001 (the default). If you override PORT
    # in .env.production, update this URL to match.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/up/databases"]
      interval: "30s"
      timeout: "5s"
      start_period: "15s"
      retries: 3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: "postgres:16.0-bookworm"
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-${POSTGRES_USER}}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./.backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: "5s"
      timeout: "5s"
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
