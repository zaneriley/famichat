name: Messaging QA

on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "QA mode to run"
        required: true
        default: fast
        type: choice
        options:
          - fast
          - deep

concurrency:
  group: messaging-qa-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  qa-fast:
    name: QA Fast (PR/Main)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'fast')
    env:
      QA_RUN_ID: gha-${{ github.run_id }}-${{ github.run_attempt }}-fast
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CI dependencies
        working-directory: backend
        run: ./run ci:install-deps

      - name: Start environment
        working-directory: backend
        run: ./run ci:setup-env

      - name: Set up database
        working-directory: backend
        run: ./run ci:setup-db

      - name: Run messaging QA fast gate
        working-directory: backend
        run: ./run qa:messaging:fast

      - name: Enforce fast outcome not FAIL/BLOCKED
        if: always()
        run: |
          report=".tmp/_qa_messaging/${QA_RUN_ID}/gate_report.json"
          outcome="$(jq -r '.outcome // "MISSING"' "${report}")"
          case "${outcome}" in
            PASS)
              ;;
            WARN)
              echo "Fast messaging QA completed with warnings."
              ;;
            *)
              echo "Fast messaging QA outcome was '${outcome}' (expected PASS or WARN)."
              exit 1
              ;;
          esac

      - name: Print fast gate summary
        if: always()
        run: |
          jq '{run_id, outcome, critical_failures, blocked_failures, global_failures}' \
            ".tmp/_qa_messaging/${QA_RUN_ID}/gate_report.json"

      - name: Upload fast QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: messaging-qa-fast-${{ github.run_id }}-${{ github.run_attempt }}
          path: .tmp/_qa_messaging/${{ env.QA_RUN_ID }}
          if-no-files-found: warn

  qa-deep:
    name: QA Deep (Nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'deep')
    env:
      QA_RUN_ID: gha-${{ github.run_id }}-${{ github.run_attempt }}-deep
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CI dependencies
        working-directory: backend
        run: ./run ci:install-deps

      - name: Start environment
        working-directory: backend
        run: ./run ci:setup-env

      - name: Set up database
        working-directory: backend
        run: ./run ci:setup-db

      - name: Run messaging QA deep gate
        working-directory: backend
        run: ./run qa:messaging:deep

      - name: Enforce deep outcome not FAIL/BLOCKED
        if: always()
        run: |
          report=".tmp/_qa_messaging/${QA_RUN_ID}/gate_report.json"
          outcome="$(jq -r '.outcome // "MISSING"' "${report}")"
          case "${outcome}" in
            PASS)
              ;;
            WARN)
              echo "Deep messaging QA completed with warnings."
              ;;
            *)
              echo "Deep messaging QA outcome was '${outcome}' (expected PASS or WARN)."
              exit 1
              ;;
          esac

      - name: Print deep gate summary
        if: always()
        run: |
          jq '{run_id, outcome, canonical_flow, canonical_flow_coverage, recovery_rejoin_contract, critical_failures, blocked_failures, global_failures}' \
            ".tmp/_qa_messaging/${QA_RUN_ID}/gate_report.json"

      - name: Upload deep QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: messaging-qa-deep-${{ github.run_id }}-${{ github.run_attempt }}
          path: .tmp/_qa_messaging/${{ env.QA_RUN_ID }}
          if-no-files-found: warn
