name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
    outputs:
      release_created: ${{ steps.release.outputs.release_created || steps.release_skip.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name || steps.release_skip.outputs.tag_name }}
      prerelease: ${{ steps.release.outputs.prerelease || steps.release_skip.outputs.prerelease }}
    steps:
      - name: Skip when release token is unavailable
        if: ${{ env.RELEASE_PLEASE_TOKEN == '' }}
        id: release_skip
        run: |
          echo "Skipping release-please: configure RELEASE_PLEASE_TOKEN to allow PR creation."
          echo "release_created=false" >> "${GITHUB_OUTPUT}"
          echo "tag_name=" >> "${GITHUB_OUTPUT}"
          echo "prerelease=" >> "${GITHUB_OUTPUT}"

      - uses: google-github-actions/release-please-action@v3
        if: ${{ env.RELEASE_PLEASE_TOKEN != '' }}
        id: release
        with:
          release-type: elixir
          package-name: zane-riley-famichat
          version-file: "backend/mix.exs"
          prerelease: true
          token: ${{ env.RELEASE_PLEASE_TOKEN }}
          changelog-types: '[
            {"type":"feat","section":"Features","hidden":false},
            {"type":"fix","section":"Bug Fixes","hidden":false},
            {"type":"docs","section":"Documentation","hidden":false},
            {"type":"chore","section":"Miscellaneous","hidden":false}]'

  build-and-push:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          build-args: |
            MIX_ENV=prod
            NODE_ENV=production
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.release-please.outputs.tag_name }}
            ${{ needs.release-please.outputs.prerelease != 'true' && format('ghcr.io/{0}:latest', github.repository) || '' }}
