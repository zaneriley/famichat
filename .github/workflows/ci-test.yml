name: Test

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ExUnit + Rust tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      FAMICHAT_NATIVE: 1
      MIX_ENV: test
      SECRET_KEY_BASE: test-secret-key-base-that-is-at-least-64-bytes-long-for-phoenix-to-accept-it
      POSTGRES_USER: famichat
      POSTGRES_PASSWORD: password
      POSTGRES_HOST: localhost
      POSTGRES_DB: famichat
      POSTGRES_PORT: 5432
      CLOAK_KEY: dGVzdC1jbG9hay1rZXktMzItYnl0ZXMhIQ==

    services:
      postgres:
        image: postgres:16.0-bookworm
        env:
          POSTGRES_USER: famichat
          POSTGRES_PASSWORD: password
          POSTGRES_DB: famichat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U famichat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir and OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          targets: wasm32-unknown-unknown

      - name: Cache Mix dependencies
        uses: actions/cache@v4
        with:
          path: |
            backend/deps
            backend/_build
          key: ${{ runner.os }}-mix-test-${{ hashFiles('backend/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-test-
            ${{ runner.os }}-mix-

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            backend/infra/target
          key: ${{ runner.os }}-rust-${{ hashFiles('backend/infra/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - name: Install Mix dependencies
        working-directory: backend
        run: mix deps.get

      - name: Compile
        working-directory: backend
        run: mix compile

      - name: Set up database
        working-directory: backend
        run: mix ecto.setup

      - name: Run tests
        working-directory: backend
        run: ./run ci:test

      - name: Check known_failure ceiling
        working-directory: backend
        run: |
          count=$(grep -rc '@tag known_failure:' test/ | awk -F: '{s+=$2} END {print s}')
          ceiling=$(cat .known_failure_ceiling)
          echo "known_failure count: $count, ceiling: $ceiling"
          if [ "$count" -gt "$ceiling" ]; then
            echo "::error::known_failure count ($count) exceeds ceiling ($ceiling)"
            exit 1
          fi
