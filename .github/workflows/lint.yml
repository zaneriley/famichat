name: Lint

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and boundary checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      FAMICHAT_NATIVE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck ripgrep

      - name: Set up Elixir and OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Install cargo-deny
        run: cargo install --locked --version 0.19.0 cargo-deny

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache Mix dependencies
        uses: actions/cache@v4
        with:
          path: |
            backend/deps
            backend/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('backend/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: backend/assets/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('backend/assets/package-lock.json', 'backend/assets/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Mix dependencies
        working-directory: backend
        run: mix deps.get

      - name: Install JS dependencies
        working-directory: backend/assets
        run: npm install

      - name: Run full lint suite
        working-directory: backend
        run: ./run ci:lint

      - name: Check known_failure ceiling
        working-directory: backend
        run: |
          count=$(grep -rc '@tag known_failure:' test/ | awk -F: '{s+=$2} END {print s}')
          ceiling=$(cat .known_failure_ceiling)
          echo "known_failure count: $count, ceiling: $ceiling"
          if [ "$count" -gt "$ceiling" ]; then
            echo "::error::known_failure count ($count) exceeds ceiling ($ceiling)"
            exit 1
          fi
