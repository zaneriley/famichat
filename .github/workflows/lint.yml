name: Lint

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and boundary checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl shellcheck ripgrep

      - name: Check docs boundaries
        working-directory: backend
        run: ./run docs:boundary-check

      - name: Set up Elixir and OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - name: Cache Mix dependencies
        uses: actions/cache@v4
        with:
          path: |
            backend/deps
            backend/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('backend/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install Mix dependencies
        working-directory: backend
        run: mix deps.get

      - name: Enforce canonical Plug session keys
        run: |
          if rg -n \
            'get_session\([^,\n]+,\s*("access_token"|"refresh_token"|"device_id"|"user_locale"|"redirect_count"|"invite_token"|:access_token|:refresh_token|:device_id|:user_locale|:redirect_count|:invite_token)\)|put_session\([^,\n]+,\s*("access_token"|"refresh_token"|"device_id"|"user_locale"|"redirect_count"|"invite_token"|:access_token|:refresh_token|:device_id|:user_locale|:redirect_count|:invite_token)\)' \
            backend/lib backend/test; then
            echo "Use FamichatWeb.SessionKeys for Plug session accessors."
            exit 1
          fi

      - name: Check all phx-hook names are registered in app.js
        working-directory: backend
        run: |
          hooks_in_templates=$(rg 'phx-hook="([^"]+)"' lib --only-matching --no-filename \
            | sed 's/phx-hook="//;s/"//' | sort -u)
          failed=0
          for hook in $hooks_in_templates; do
            if ! grep -qE "^\s+$hook\s*:" assets/js/app.js; then
              echo "ERROR: phx-hook=\"$hook\" used in templates but not registered in assets/js/app.js"
              failed=1
            fi
          done
          [ $failed -eq 0 ] && echo "All phx-hook names registered." || exit 1

      - name: Run full lint suite
        working-directory: backend
        run: ./run ci:lint
